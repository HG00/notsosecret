server {
    listen 80;
    listen [::]:80;
    server_name DOMAIN;
    root /var/www/html;
}

server {
    listen 443 ssl;
    listen [::]:443 ssl;
    server_name DOMAIN;

    ssl_certificate     /etc/letsencrypt/live/DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/DOMAIN/privkey.pem;

    root /var/www/html;
}
